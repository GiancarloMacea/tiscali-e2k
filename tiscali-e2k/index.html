<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4A3F8E" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tiscali E2K" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <title>Tiscali E2K — Area Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker + cache clear alla chiusura -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });

        // Pulisce la cache quando si chiude/nasconde l'app
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'hidden') {
            navigator.serviceWorker.ready.then(reg => {
              if (reg.active) reg.active.postMessage('CLEAR_CACHE');
            });
          }
        });
      }
    </script>
  </body>
</html>
