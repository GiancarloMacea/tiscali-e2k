<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4A3F8E" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tiscali E2K" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <title>Tiscali E2K — Area Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Service Worker — registrazione + auto-update sicuro
      Generato con AI Claude · Aprile 2026

      RIMOSSO il vecchio handler `visibilitychange → CLEAR_CACHE`
      che causava schermate bianche su mobile (cancellava tutta la cache
      ogni volta che l'app andava in background; con rete debole l'app
      non poteva più caricare nulla).
    -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });

        // Quando un nuovo SW prende il controllo (es. dopo un fix pubblicato)
        // ricarico una sola volta per servire la versione aggiornata.
        // Così gli utenti con SW vecchio rotto si auto-aggiornano al primo refresh.
        let __reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (__reloaded) return;
          __reloaded = true;
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
