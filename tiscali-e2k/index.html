<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover abilita le CSS env(safe-area-inset-*) su iPhone X+ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4A3F8E" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tiscali E2K" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <title>Tiscali E2K — Area Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Service Worker · Generato con AI Claude · Aprile 2026

      Strategia "minimal/passthrough":
      - Soddisfa i criteri Chrome per "Installa app" (manifest + SW con fetch).
      - NON intercetta i fetch (fetch handler vuoto = lascia tutto al browser).
      - NON cachea nulla → impossibile servire una versione vecchia rotta.
      - skipWaiting + clients.claim per attivazione immediata.

      Auto-reload sicuro: quando un nuovo SW prende il controllo (perché abbiamo
      pubblicato un fix), ricarico una sola volta per servire la versione
      aggiornata. sessionStorage previene loop infiniti.
    -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });

        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (sessionStorage.getItem('__sw_reloaded')) return;
          sessionStorage.setItem('__sw_reloaded', '1');
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
